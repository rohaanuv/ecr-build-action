<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Action Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg-start: #f8fafc;
      --bg-end: #e2e8f0;
      --text-main: #0f172a;
      --text-subtle: #334155;
      --card-bg: #ffffff;
      --accent: #2563eb;
      --border: #cbd5e1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: var(--text-main);
    }

    .card {
      width: min(720px, 92vw);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      font-weight: 600;
      text-transform: uppercase;
    }

    h1 {
      margin: 1rem 0 0.5rem;
      font-size: clamp(1.75rem, 2.5vw, 2.3rem);
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--text-subtle);
      font-size: 1.02rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">CI/CD Ready</span>
    <h1>Hello from GitHub Action</h1>
    <p>
      This page is served by Nginx from a Docker image built and published
      automatically through GitHub Actions to AWS ECR.
    </p>
  </main>
</body>
</html>
